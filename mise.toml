[tools]
go = "1.26.2"
hk = "1.44.3"
pkl = "latest"

[tasks.fmt]
description = "Format Go code"
run = "go fmt ./..."

[tasks.tidy]
description = "Tidy Go module files"
run = "go mod tidy"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.check]
description = "Run formatting, module, vet, test, and hook checks"
run = [
  "go fmt ./...",
  "go mod tidy",
  "go vet ./...",
  "go test ./...",
  "hk check",
]

[tasks.pre-commit]
description = "Run pre-commit hook"
run = "hk run pre-commit"

[tasks.install-hooks]
description = "Install hk-managed git hooks"
run = "hk install"

[tasks."dev:dummy-pr"]
description = "Create or reuse an isolated draft GitHub PR for local workflow testing"
run = "scripts/dev-dummy-pr.sh setup"

[tasks."dev:dummy-pr:reset"]
description = "Recreate the isolated dummy PR worktree and branch from origin/main"
run = "scripts/dev-dummy-pr.sh reset"

[tasks."dev:dummy-pr:dry-run"]
description = "Print the dummy PR workflow without mutating git or GitHub"
run = "scripts/dev-dummy-pr.sh setup --dry-run"
